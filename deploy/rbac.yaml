apiVersion: v1
kind: ServiceAccount
metadata:
  name: deckhouse-mcp
  namespace: d8-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:deckhouse-mcp
rules:
  # Core resources — read-only
  - apiGroups: [""]
    resources: ["nodes", "pods", "events"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Core resources — cluster configuration (read-only)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["d8-cluster-configuration"]
  # Core resources — node management (P1 write)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["update", "patch"]
  # Deckhouse CRDs — read-only
  - apiGroups: ["deckhouse.io"]
    resources:
      - nodegroups
      - staticinstances
      - moduleconfigs
      - deckhouserelease
    verbs: ["get", "list"]
  # Deckhouse CRDs — write (P0 handlers)
  - apiGroups: ["deckhouse.io"]
    resources:
      - staticinstances
      - sshcredentials
    verbs: ["create"]
  # Deckhouse CRDs — write (P1 handlers)
  - apiGroups: ["deckhouse.io"]
    resources:
      - staticinstances
    verbs: ["delete"]
  - apiGroups: ["deckhouse.io"]
    resources:
      - nodegroups
    verbs: ["create"]
  - apiGroups: ["deckhouse.io"]
    resources:
      - moduleconfigs
    verbs: ["update"]
  - apiGroups: ["deckhouse.io"]
    resources:
      - deckhouserelease
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:deckhouse-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:deckhouse-mcp
subjects:
  - kind: ServiceAccount
    name: deckhouse-mcp
    namespace: d8-system
